# Example: run hlsl-clippy as a CI gate on a GitHub Actions workflow.
#
# Drop this file at `.github/workflows/lint-hlsl.yml` in your shader repo,
# adjust the path glob and target SM profile to taste, and the workflow
# will:
#   * download the latest hlsl-clippy release for the runner's OS;
#   * run it across every HLSL file matching the glob;
#   * surface diagnostics inline on the PR via the GitHub Annotation
#     format (the file/line annotations rendered by the GitHub UI), so
#     reviewers see the warning without leaving the PR view.
#
# Exit codes:
#   0 — no diagnostics
#   1 — at least one warning fired
#   2 — at least one error fired (or invocation error)
#
# `--format` is auto-selected to `github-annotations` when the workflow
# detects `$GITHUB_ACTIONS=true`, so passing it explicitly here is just
# defensive — the workflow command emission is the same either way.

name: HLSL lint

on:
  push:
    branches: ["**"]
    paths:
      - "**/*.hlsl"
      - "**/*.hlsli"
      - "**/.hlsl-clippy.toml"
  pull_request:
    paths:
      - "**/*.hlsl"
      - "**/*.hlsli"
      - "**/.hlsl-clippy.toml"

permissions:
  contents: read
  pull-requests: write   # required for inline annotations on PR diffs

jobs:
  lint:
    name: hlsl-clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin to a release tag for reproducibility. Bump when you want a
      # newer rule pack. The release URL below resolves to the latest
      # Linux x86_64 archive at <hlsl-clippy.tag>.
      - name: Download hlsl-clippy
        env:
          HLSL_CLIPPY_TAG: v0.5.0
        run: |
          set -euo pipefail
          asset="hlsl-clippy-${HLSL_CLIPPY_TAG#v}-linux-x86_64.tar.gz"
          curl -sSL -o /tmp/hlsl-clippy.tar.gz \
            "https://github.com/NelCit/hlsl-clippy/releases/download/${HLSL_CLIPPY_TAG}/${asset}"
          mkdir -p /tmp/hlsl-clippy
          tar -xzf /tmp/hlsl-clippy.tar.gz -C /tmp/hlsl-clippy --strip-components=1
          /tmp/hlsl-clippy/hlsl-clippy --version

      - name: Lint shaders
        # `--format=github-annotations` would be auto-selected on Actions,
        # but make it explicit so dry-runs locally with `act` produce the
        # same output. Tweak the glob to your shader tree's layout.
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          fail=0
          for shader in shaders/**/*.hlsl; do
            /tmp/hlsl-clippy/hlsl-clippy lint "$shader" \
              --format=github-annotations \
              || fail=$?
          done
          # Exit 1 (warnings) is configurable: turn it into a hard fail
          # by uncommenting the line below, or leave it advisory by
          # mapping warning-only runs to exit 0.
          # if [ "$fail" -eq 1 ]; then fail=0; fi
          exit "$fail"
