# Release — VS Code Marketplace publish (Phase 5 sub-phase 5e per ADR 0014).
#
# Trigger: push of a tag matching `v*.*.*` (same trigger as release.yml, but a
# separate workflow file so a Marketplace failure does not block the binary
# GitHub Release path — see ADR 0014 §"Sub-phase 5e — Distribution").
#
# Pre-work (manual, one-time, out of CI scope):
#   1. Register the `nelcit` publisher namespace on the VS Code Marketplace
#      via https://marketplace.visualstudio.com/manage. Verification can take
#      several days; do this well before the v0.5 tag fires.
#   2. Create an Azure DevOps Personal Access Token with the Marketplace
#      "Manage" scope, store it as the `VSCE_PAT` repository secret.
#   3. Optional: register the same publisher on Open VSX (Eclipse Foundation)
#      and store an `OVSX_PAT` secret for the deferred Open-VSX track. ADR
#      0014 §"Sub-phase 5e — Distribution" defers Open VSX to v0.6 — leave
#      the stub commented for now.
#
# Conditional on secret behaviour:
#   - If VSCE_PAT is empty (e.g. fork CI without secrets), the publish step
#     is skipped — the .vsix is still built, attached to the GitHub Release
#     for manual sideload, and the workflow exits successfully.
#   - If VSCE_PAT is set, vsce publishes to the Marketplace.
#
# Third-party action SHAs pinned for supply-chain safety:
#   actions/checkout@v4.2.2  → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/setup-node@v4.0.4 → 0a44ba7841725637a19e28fa30b79a866c81b0a6
#
# softprops/action-gh-release@v2: tag-only pin — orchestrator follow-up to
# resolve a SHA pin via `gh api repos/softprops/action-gh-release/git/ref/
# tags/v2` once a stable v2.x tag is selected for the v0.5 release.

name: Release VS Code Extension

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # required to attach .vsix to the GitHub Release

jobs:
  publish:
    name: Build & publish .vsix
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Derive version from tag
        id: version
        shell: bash
        run: |
          tag="${GITHUB_REF##*/}"
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Node 20
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npx tsc -p .

      - name: Verify package.json version matches tag
        working-directory: vscode-extension
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          actual=$(node -p "require('./package.json').version")
          if [ "$actual" != "$EXPECTED" ]; then
            echo "::error::vscode-extension/package.json version ($actual) does not match tag ($EXPECTED)"
            echo "Bump package.json before tagging — see tools/release-checklist.md"
            exit 1
          fi
          echo "Version match: $actual"

      - name: Package .vsix
        id: package
        working-directory: vscode-extension
        env:
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          out="hlsl-clippy-${VERSION}.vsix"
          npx --yes @vscode/vsce package --out "$out"
          echo "vsix=vscode-extension/$out" >> "$GITHUB_OUTPUT"
          ls -la "$out"

      - name: Publish to VS Code Marketplace (if VSCE_PAT set)
        if: env.VSCE_PAT != ''
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          out="hlsl-clippy-${VERSION}.vsix"
          npx --yes @vscode/vsce publish --packagePath "$out" --pat "$VSCE_PAT"

      - name: Skip Marketplace publish (no VSCE_PAT secret)
        if: env.VSCE_PAT == ''
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          echo "VSCE_PAT not set — skipping Marketplace publish."
          echo "The .vsix is still attached to the GitHub Release for manual sideload."

      # ── Open VSX deferred to v0.6 (ADR 0014 §"Sub-phase 5e") ──────────────
      # Uncomment when the v0.6 release rolls and the OVSX_PAT secret is set:
      #
      # - name: Publish to Open VSX (if OVSX_PAT set)
      #   if: env.OVSX_PAT != ''
      #   working-directory: vscode-extension
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #     VERSION: ${{ steps.version.outputs.version }}
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     out="hlsl-clippy-${VERSION}.vsix"
      #     npx --yes ovsx publish "$out" --pat "$OVSX_PAT"

      - name: Attach .vsix to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.package.outputs.vsix }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
