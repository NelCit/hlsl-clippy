# CI — build shader-clippy on Linux (Clang), Windows (MSVC/Ninja), macOS (Clang/Ninja)
#
# Third-party action SHAs pinned for supply-chain safety.
# Update them with: gh api /repos/<owner>/<repo>/git/ref/tags/<tag>
#
# Pinned SHAs (as of 2026-04-30, verified via GitHub API):
#   actions/checkout@v4.2.2            → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/cache@v4.2.3               → 5a3ec84eff668545956fd18022155c47e93e2684
#   seanmiddleditch/gha-setup-ninja@v5 → 96bed6edff20d1dd61ecff9b75cc519d516e6401
#   ilammy/msvc-dev-cmd@v1.13.0        → 0b201ec74fa43914dc39ae48a89fd1d8cb592756
#     (ilammy SHA is the underlying commit; the tag is annotated — GHA resolves
#      annotated tags to their commit object automatically)
#
# macOS runner: macos-14 is Apple Silicon (ARM64). Homebrew prefix is
# /opt/homebrew (Intel runners use /usr/local). Per ADR 0014 §"Sub-phase 5d",
# we ship Apple-Silicon-only on v0.5; revisit Intel coverage if user demand
# materialises.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  # The slang-bump-regression job runs nightly so a Slang patch that breaks
  # our reflection surfaces is caught with lead time before the next
  # user-visible bump. Manual `workflow_dispatch` lets a maintainer kick
  # the job off ad-hoc when investigating a Slang upstream incident.
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      # ── 2. Restore build cache ─────────────────────────────────────────────
      # Key: OS + hash of CMakeLists.txt + current submodule HEADs.
      # Submodule SHAs are captured via .gitmodules HEAD pointers baked into
      # the checkout; we hash them together with CMakeLists.txt.
      #
      # TODO: cache Slang's prebuilt artifacts via sccache once vendored.
      - name: Cache build directory
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: build
          key: build-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.gitmodules', 'cmake/SlangVersion.cmake') }}
          restore-keys: |
            build-${{ matrix.os }}-

      # ── 3. Ninja ───────────────────────────────────────────────────────────
      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5
        # SHA verified: gh api repos/seanmiddleditch/gha-setup-ninja/git/ref/tags/v5

      # ── 4a. (Linux) Install Clang 18 + libc++ 18 from llvm.org ────────────
      - name: Install Clang 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          # Use the official LLVM installer script so we get a fresh Clang 18
          # regardless of what Ubuntu ships in its default apt mirror. The
          # `all` flag installs the full LLVM 18 component set including
          # libc++-18-dev, which we link against on Linux instead of the
          # system libstdc++ — Ubuntu 24.04's libstdc++ 13 lacks reliable
          # std::expected symbol visibility despite shipping <expected>.
          # Per ADR 0004 the floor is "Clang 18+ with libc++ 17+ OR
          # libstdc++ 13+"; we pick libc++ 18 here.
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          # Sanity-check
          clang-18 --version
          clang++-18 --version

      # ── 4b. (Windows) Activate MSVC dev environment for clang-cl ─────────
      # We use clang-cl (Clang front-end with MSVC-compatible flag syntax +
      # MSVC ABI) instead of cl.exe everywhere on Windows. clang-cl reuses
      # the MSVC installation: the linker (`link.exe`), the Windows SDK
      # headers, and the C runtime libs. We keep `msvc-dev-cmd` to wire up
      # `INCLUDE`, `LIB`, and `PATH` to the VS install; the cmake configure
      # step below sets `CC=clang-cl`, `CXX=clang-cl` to swap the compiler.
      # Win: smaller / faster binaries (Clang LTO, better dead-code elim),
      # one compiler family across all 3 platforms, better diagnostics.
      # `windows-latest` runners ship LLVM 20+ at `C:\Program Files\LLVM\bin`.
      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      # ── 4c. (macOS) Install Clang 18 from Homebrew ────────────────────────
      # macos-14 (Apple Silicon) ships Apple Clang as the default toolchain;
      # we install Homebrew's llvm@18 to keep the C++23 floor consistent
      # with the Linux runner (ADR 0004 — same compiler floor across CI
      # runners). The /opt/homebrew prefix is Apple-Silicon-only; on Intel
      # runners the path would be /usr/local/opt/llvm@18/bin (not used here).
      - name: Install Clang 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install llvm@18
          # Homebrew's llvm@18 is keg-only and ships unversioned binaries
          # (`clang`, `clang++`) — not `clang-18`/`clang++-18` like apt's
          # llvm.sh on Linux. Prepend the keg's bin/ to PATH and use the
          # unversioned names everywhere on macOS.
          echo "/opt/homebrew/opt/llvm@18/bin" >> "$GITHUB_PATH"
          /opt/homebrew/opt/llvm@18/bin/clang --version
          /opt/homebrew/opt/llvm@18/bin/clang++ --version

      # ── 4d. Slang prebuilt cache ─────────────────────────────────────────
      # Two-tier caching:
      #   (i)  actions/cache keyed on cmake/SlangVersion.cmake — per-version
      #        cache of the extracted Slang prebuilt directory. Cache hit
      #        means tools/fetch-slang.* short-circuits on the idempotency
      #        check (existing `include/` dir) and skips the ~50-100 MB
      #        download. Saves ~30-60s per leg.
      #   (ii) tools/fetch-slang.* downloads the upstream tarball if the
      #        cache directory is empty. Idempotent.
      - name: Cache Slang prebuilt (Linux + macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/shader-clippy/slang
          key: slang-${{ runner.os }}-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Cache Slang prebuilt (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.LOCALAPPDATA }}\shader-clippy\slang
          key: slang-${{ runner.os }}-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt (Linux + macOS)
        if: runner.os != 'Windows'
        run: bash tools/fetch-slang.sh

      - name: Fetch Slang prebuilt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh tools/fetch-slang.ps1

      # ── 5. CMake configure ────────────────────────────────────────────────
      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-18
          CXX: clang++-18
          # Use Clang's bundled libc++ (full <expected>); avoids libstdc++ 13
          # symbol-visibility quirks on Ubuntu 24.04. Per ADR 0004's floor.
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        env:
          CC: clang-cl
          CXX: clang-cl
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        env:
          # Homebrew llvm@18 ships unversioned `clang` / `clang++` (vs apt's
          # versioned names on Linux). The PATH prepend in the install step
          # ensures the keg's binary is found ahead of Apple Clang.
          CC: clang
          CXX: clang++
          # Use Clang's bundled libc++ (matches Linux config; libc++ ships
          # the full C++23 stdlib including std::expected).
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # ── 6. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build

      # ── 7. Smoke test ─────────────────────────────────────────────────────
      # The rename agent restructures crates/cli + crates/core → cli/ + core/,
      # placing the executable at:
      #   ./build/cli/shader-clippy          (Linux, Ninja single-config)
      #   ./build/cli/shader-clippy.exe      (Windows, Ninja single-config)
      #   ./build/cli/Release/shader-clippy.exe  (MSVC multi-config — not used
      #                                          here because we force Ninja,
      #                                          but kept as a fallback)
      # Before the rename lands the binary sits at:
      #   ./build/shader-clippy   /   ./build/shader-clippy.exe
      # We probe all candidate paths and run whichever we find first.

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/shader-clippy" \
              "./build/shader-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate shader-clippy binary" >&2
            exit 1
          fi
          echo "Using binary: $BIN"
          OUTPUT=$("$BIN" --version)
          echo "Output: $OUTPUT"
          # Expected version is read from core/src/version.cpp at runtime so
          # the smoke test stays current without per-bump workflow edits.
          EXPECTED=$(grep -oE 'return[[:space:]]+"[0-9]+\.[0-9]+\.[0-9]+"' core/src/version.cpp | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$OUTPUT" != "$EXPECTED" ]; then
            echo "ERROR: expected '$EXPECTED', got '$OUTPUT'" >&2
            exit 1
          fi
          echo "Smoke test passed."

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            ".\build\cli\shader-clippy.exe",
            ".\build\cli\Release\shader-clippy.exe",
            ".\build\shader-clippy.exe"
          )
          $bin = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) {
              $bin = $c
              break
            }
          }
          if (-not $bin) {
            Write-Error "ERROR: could not locate shader-clippy binary"
            exit 1
          }
          Write-Host "Using binary: $bin"
          $output = & $bin --version
          Write-Host "Output: $output"
          $expected = (Select-String -Path core\src\version.cpp -Pattern 'return\s+"(\d+\.\d+\.\d+)"').Matches[0].Groups[1].Value
          if ($output -ne $expected) {
            Write-Error "ERROR: expected '$expected', got '$output'"
            exit 1
          }
          Write-Host "Smoke test passed."

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/shader-clippy" \
              "./build/shader-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate shader-clippy binary" >&2
            exit 1
          fi
          echo "Using binary: $BIN"
          OUTPUT=$("$BIN" --version)
          echo "Output: $OUTPUT"
          EXPECTED=$(grep -oE 'return[[:space:]]+"[0-9]+\.[0-9]+\.[0-9]+"' core/src/version.cpp | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "$OUTPUT" != "$EXPECTED" ]; then
            echo "ERROR: expected '$EXPECTED', got '$OUTPUT'" >&2
            exit 1
          fi
          echo "Smoke test passed."

  # ── Slang AST coverage (ADR 0021 sub-phase B — v1.4+) ─────────────────
  # Verifies that `.slang` files dispatch through tree-sitter-slang and
  # that AST-stage rules fire on Slang sources. Pre-v1.4 the same job
  # asserted the inverse (AST/CFG silent on `.slang`, language-skip-ast
  # notice fires once); sub-phase B lights up the AST surface, so the
  # contract flips: AST-stage rules MUST fire on the smoke fixture, and
  # `clippy::language-skip-ast` MUST NOT fire on any sub-phase B fixture.
  #
  # Reflection-stage rule coverage is preserved (the v1.3.1 bridge fix
  # still applies, and the same `oversized_cbuffer_via_reflection.slang`
  # fixture still asserts `oversized-cbuffer` fires).
  #
  # Linux-only — the dispatch logic is platform-agnostic and the cost of
  # running it across the matrix is not justified by the marginal
  # coverage. continue-on-error is FALSE so this is a regular merge gate.
  slang-ast-coverage:
    name: Slang AST coverage (Linux Clang)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Restore build cache (Linux)
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: build
          key: build-ubuntu-latest-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.gitmodules', 'cmake/SlangVersion.cmake') }}
          restore-keys: |
            build-ubuntu-latest-

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5

      - name: Install Clang 18 (Linux)
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Cache Slang prebuilt
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/shader-clippy/slang
          key: slang-${{ runner.os }}-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      - name: CMake configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_FLAGS="-stdlib=libc++"

      - name: Build
        run: cmake --build build --target shader-clippy

      - name: Locate shader-clippy binary
        id: locate
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/shader-clippy" \
              "./build/shader-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate shader-clippy binary" >&2
            exit 1
          fi
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"

      - name: Lint Slang fixtures (sub-phase B contract)
        run: |
          set -euo pipefail
          BIN="${{ steps.locate.outputs.bin }}"
          for fixture in tests/fixtures/slang/*.slang; do
            echo "=== $fixture ==="
            output=$("$BIN" lint "$fixture" --format=json) || true
            echo "$output"
            # (a) NO `clippy::language-skip-ast` notice — sub-phase B's
            # parser dispatch lights up AST + CFG on every `.slang`
            # source. The notice is preserved as a code path for
            # future un-parseable languages but never fires today.
            # Bash `if cmd; then` runs the body when `cmd` exits 0. The
            # error case is "language-skip-ast IS in the diagnostics list"
            # — so Python must exit 0 (success) when the rule is present
            # so the body fires. Pre-fix the exit codes were inverted and
            # the job errored on every `.slang` fixture that produced any
            # other diagnostic. Sub-phase B's contract: `.slang` paths
            # dispatch through tree-sitter-slang and AST-stage rules fire,
            # so the language-skip-ast notice should never appear.
            if echo "$output" | python3 -c "import sys, json; sys.exit(0 if any(d.get('rule') == 'clippy::language-skip-ast' for d in json.load(sys.stdin)) else 1)"; then
              echo "ERROR: $fixture emitted clippy::language-skip-ast (sub-phase B should suppress this)." >&2
              exit 1
            fi
          done
          echo "All Slang fixtures cleared the sub-phase B contract: no language-skip-ast notice."

      # ADR 0021 sub-phase B.4 — AST coverage gate. The smoke fixture
      # `tests/fixtures/slang/ast_smoke.slang` carries HLSL-syntax-level
      # patterns that fire ~5 distinct AST-stage rules. The gate asserts
      # at least one AST-stage diagnostic fires on the smoke fixture
      # (i.e. the parser dispatch lit up the AST stage and rule patterns
      # match Slang's grammar nodes). The list below intentionally
      # over-enumerates so the test stays green if any single rule
      # changes its node-kind requirements between versions; the
      # contract is "≥ 1 AST rule, not zero," not "exactly this set."
      - name: AST coverage on ast_smoke.slang
        run: |
          set -euo pipefail
          BIN="${{ steps.locate.outputs.bin }}"
          fixture="tests/fixtures/slang/ast_smoke.slang"
          output=$("$BIN" lint "$fixture" --format=json) || true
          echo "$output"
          # B.4 contract: at least one canonical AST-stage rule must fire
          # on the smoke fixture. The list below over-enumerates so any
          # single rule's node-kind change between versions doesn't break
          # the gate; the contract is ">= 1 AST rule, not zero," not
          # "exactly this set." We use grep on rule-id substrings to keep
          # the YAML one-liner-friendly.
          ast_rule_ids="pow-const-squared|pow-to-mul|pow-base-two-to-exp2|pow-integer-decomposition|inv-sqrt-to-rsqrt|manual-distance|compare-equal-float|comparison-with-nan-literal|length-comparison|manual-reflect|manual-step|manual-smoothstep|sin-cos-pair|mul-identity|lerp-extremes"
          if ! echo "$output" | python3 -c "import sys, json, re; pat=re.compile('^(' + sys.argv[1] + ')$'); rules={d.get('rule') for d in json.load(sys.stdin)}; fired=[r for r in rules if pat.match(r or '')]; print('AST rules fired on .slang smoke fixture:', sorted(fired), file=sys.stderr); sys.exit(0 if fired else 1)" "$ast_rule_ids"; then
            echo "ERROR: $fixture fired zero AST-stage rules; tree-sitter-slang dispatch may be broken." >&2
            exit 1
          fi
          echo "AST coverage gate passed -- at least one AST rule fires on .slang."

      # v1.3.1 (ADR 0020 sub-phase A "Risks & mitigations") — verify the
      # bridge fix actually lights up reflection-stage rules on `.slang`.
      # The dedicated `oversized_cbuffer_via_reflection.slang` fixture
      # contains an 8 KB cbuffer that the `oversized-cbuffer` rule
      # (Stage::Reflection) is engineered to fire on. Pre-fix this rule
      # silently skipped on `.slang`; post-fix it fires identically to
      # the HLSL path. Locking this into CI catches future regressions
      # where the bridge or the orchestrator drops `.slang` reflection
      # again.
      - name: Reflection rule lights up on `.slang`
        run: |
          set -euo pipefail
          BIN="${{ steps.locate.outputs.bin }}"
          fixture="tests/fixtures/slang/oversized_cbuffer_via_reflection.slang"
          output=$("$BIN" lint "$fixture" --format=json) || true
          echo "$output"
          if ! echo "$output" | python3 -c "import sys, json; sys.exit(0 if any(d.get('rule') == 'oversized-cbuffer' for d in json.load(sys.stdin)) else 1)"; then
            echo "ERROR: $fixture did not fire 'oversized-cbuffer' (reflection-stage rule). The Slang bridge may be quarantined again." >&2
            exit 1
          fi
          echo "Reflection-stage rule fired on the .slang fixture."

  # ── Coverage (Linux Clang + llvm-cov + Codecov) ────────────────────────
  # ADR 0005 §"Coverage gate" promised this; CLAUDE.md status block calls
  # for 60% baseline rising to 80% by Phase 4. We instrument core/ only —
  # CLI / LSP get exercised end-to-end by the test corpus but the bar we
  # care about is rule-engine line coverage. Codecov uploads run on push
  # to main and PRs from forks; the action handles tokenless OIDC for
  # public repos.
  #
  # Why this is its own job and not folded into the Linux build leg:
  #   * the coverage build needs different compile flags
  #     (`-fprofile-instr-generate -fcoverage-mapping`) and a different
  #     CMAKE_BUILD_TYPE; mixing them with the Release build would defeat
  #     the build-cache key that the Linux leg shares with release.yml.
  #   * we want the coverage job to fail loudly without taking down the
  #     other CI legs.
  coverage:
    name: Coverage (Linux Clang + llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # v1.1 raises the merge-blocking gate to >= 80% line / >= 70% branch
    # coverage on `core/` (ADR 0019 §"v1.x patch trajectory"). Pre-v1.1
    # baseline per ADR 0019 §5 disposition table was ~62% branch coverage
    # on Linux Clang + libstdc++ — i.e. the new gate WILL fail until tests
    # catch up. Per the v1.1 plan we keep the gate in place (it is the
    # honest measurement) but mark the job non-blocking so the rest of CI
    # stays green; flipping this back to a hard gate is a v1.1.x patch
    # follow-up once a coverage-lift sweep lands.
    #
    # DO NOT silence the gate by lowering the thresholds — that would
    # fake-pass the v1.1 contract. The right answer is more tests.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Clang 18 + llvm-cov
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev cmake ninja-build
          # llvm-profdata-18 / llvm-cov-18 ship with the `all` apt component.
          llvm-cov-18 --version
          llvm-profdata-18 --version

      - name: Cache Slang prebuilt
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/shader-clippy/slang
          key: slang-Linux-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      - name: CMake configure (instrumented Debug)
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: "-stdlib=libc++ -fprofile-instr-generate -fcoverage-mapping -O0 -g"
          LDFLAGS: "-stdlib=libc++ -fprofile-instr-generate"
        run: |
          cmake -B build-cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSHADER_CLIPPY_USE_PCH=OFF \
            -DSHADER_CLIPPY_USE_LTO=OFF

      - name: Build core + tests
        run: cmake --build build-cov --target shader_clippy_unit_tests

      - name: Run tests with profile output
        env:
          # Each test invocation writes to the templated path; %m expands
          # to a unique per-process suffix so parallel ctest workers do not
          # clobber each other.
          LLVM_PROFILE_FILE: "${{ github.workspace }}/build-cov/profraw/cov-%p-%m.profraw"
        run: |
          set -euo pipefail
          mkdir -p build-cov/profraw
          # `~[golden]` excludes the 4 known-flaky golden-snapshot tests
          # (per tests/KNOWN_FAILURES.md). They occasionally
          # STATUS_STACK_BUFFER_OVERRUN on Windows + occasionally trip
          # CRLF/LF mismatches — neither is meaningful for coverage.
          ./build-cov/tests/shader_clippy_unit_tests "~[golden]"

      - name: Merge profile data
        run: |
          set -euo pipefail
          llvm-profdata-18 merge -sparse build-cov/profraw/*.profraw \
            -o build-cov/coverage.profdata

      - name: Generate lcov report (core/ only)
        run: |
          set -euo pipefail
          # `-instr-profile` consumes the merged profdata; the binary is
          # the unit-test exe (which links shader_clippy_core statically).
          # `--ignore-filename-regex` drops vendored / test code so the
          # percentage reflects rule-engine coverage.
          llvm-cov-18 export \
            -format=lcov \
            -instr-profile=build-cov/coverage.profdata \
            -ignore-filename-regex='(external|tests|build|/usr/)' \
            ./build-cov/tests/shader_clippy_unit_tests \
            > build-cov/coverage.lcov
          # Quick console summary so the failure mode in PR review is
          # legible without downloading the lcov. Saved to file so the
          # gate step below can parse the percentages out of it.
          llvm-cov-18 report \
            -instr-profile=build-cov/coverage.profdata \
            -ignore-filename-regex='(external|tests|build|/usr/)' \
            -show-branch-summary \
            ./build-cov/tests/shader_clippy_unit_tests \
            > build-cov/coverage-summary.txt
          tail -20 build-cov/coverage-summary.txt

      # ── Coverage gate (v1.1 readiness) ────────────────────────────────────
      # ADR 0019 §"v1.x patch trajectory" v1.1 ship list: lift the floor to
      # 80% line coverage AND 70% branch coverage on `core/`. Both as
      # merge-blocking gates. We parse `llvm-cov-18 report --show-branch-summary`'s
      # final TOTAL row — the last line of the report contains the rolled-up
      # percentages in fixed-position columns. The historical Codecov upload
      # below remains informational; this step is the actual gate.
      #
      # Soft-bump caveat: pre-v1.1 baseline was ~62% branch coverage on
      # Linux Clang + libstdc++ (per ADR 0019). If the gate FAILS at the new
      # threshold, the right answer is to add tests, NOT to lower the gate.
      # We deliberately do not fake-pass — the maintainer either accepts the
      # red CI leg until tests catch up, or flips this job to
      # `continue-on-error: true` as a v1.1.x patch follow-up if coverage
      # genuinely cannot rise to the bar in one cycle.
      - name: Coverage gate (line >= 80%, branch >= 70%)
        run: |
          set -euo pipefail
          # `llvm-cov-18 report --show-branch-summary` emits a TOTAL row
          # whose columns are (per the LLVM 18 source layout):
          #   Filename Regions Missed Cover Functions Missed Cover \
          #     Lines Missed Cover Branches Missed Cover
          # We pluck the LAST line, then read column-by-column.
          # Example TOTAL row:
          #   TOTAL  4321 432 90.00%  876 76 91.32%  21345 4269 80.00%  9876 3580 63.75%
          summary=build-cov/coverage-summary.txt
          if [ ! -s "$summary" ]; then
            echo "ERROR: $summary missing or empty" >&2
            exit 1
          fi
          # The trailing TOTAL line is conventionally the last non-blank line.
          total_line=$(grep -E '^TOTAL' "$summary" | tail -n1)
          if [ -z "$total_line" ]; then
            echo "ERROR: no TOTAL row in coverage summary; layout drift?" >&2
            cat "$summary" >&2
            exit 1
          fi
          echo "TOTAL row: $total_line"
          # Strip percent signs, then index the cover columns.
          # Field positions (1-based, after the TOTAL token):
          #   F2..F4   = Regions / Missed / Cover
          #   F5..F7   = Functions / Missed / Cover
          #   F8..F10  = Lines / Missed / Cover
          #   F11..F13 = Branches / Missed / Cover
          line_pct=$(  echo "$total_line" | awk '{gsub("%",""); print $10}')
          branch_pct=$(echo "$total_line" | awk '{gsub("%",""); print $13}')
          echo "Line coverage:   ${line_pct}%"
          echo "Branch coverage: ${branch_pct}%"
          # Floats compared via awk; bash arithmetic is integer-only.
          line_ok=$(  awk -v v="$line_pct"   'BEGIN{print (v+0 >= 80.0) ? 1 : 0}')
          branch_ok=$(awk -v v="$branch_pct" 'BEGIN{print (v+0 >= 70.0) ? 1 : 0}')
          rc=0
          if [ "$line_ok" != "1" ]; then
            echo "ERROR: line coverage ${line_pct}% < 80% gate (v1.1)" >&2
            rc=1
          fi
          if [ "$branch_ok" != "1" ]; then
            echo "ERROR: branch coverage ${branch_pct}% < 70% gate (v1.1)" >&2
            rc=1
          fi
          if [ $rc -ne 0 ]; then
            echo "Coverage gate FAILED. Add tests to raise the floor; do not" >&2
            echo "lower the gate. See ADR 0019 §v1.x patch trajectory." >&2
            exit 1
          fi
          echo "Coverage gate PASSED."

      - name: Upload to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0
        with:
          files: build-cov/coverage.lcov
          # No token needed for public repos using tokenless OIDC; the
          # action falls back gracefully if Codecov isn't configured for
          # the repo (PR comment + status check just don't post).
          fail_ci_if_error: false

  # ── API symbol diff (v1.0 readiness criterion #1) ──────────────────────
  # ADR 0018 §5 #1 — every type / function declared in
  # `core/include/shader_clippy/*.hpp` is part of the v1.0 stable surface.
  # We extract the post-link symbol list from `shader_clippy_core` and
  # publish it as a build artifact. v1.0 will check this artifact into
  # `tools/api/v1-symbols.txt` and a follow-up patch will gate PRs on
  # `diff` against that baseline.
  #
  # Linux-only for v1.0 — the gate cares about removed symbols, not about
  # per-platform mangling differences. Adding Windows / macOS legs is a
  # post-v1.0 nice-to-have.
  api-symbol-diff:
    name: API symbol diff (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Clang 18 + libc++
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev binutils

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5

      - name: Cache Slang prebuilt
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/shader-clippy/slang
          key: slang-Linux-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      - name: CMake configure
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build shader_clippy_core
        run: cmake --build build --target shader_clippy_core

      - name: Extract public symbols
        run: |
          set -euo pipefail
          mkdir -p build/api
          # Locate the static (or shared) lib the build produced. The static
          # lib is the canonical artefact; the shared lib is opt-in via
          # BUILD_SHARED_LIBS. Pick whichever exists.
          LIB=""
          for candidate in \
              build/core/libshader_clippy_core.a \
              build/core/libshader_clippy_core.so \
              build/libshader_clippy_core.a \
              build/libshader_clippy_core.so; do
            if [ -f "$candidate" ]; then
              LIB="$candidate"
              break
            fi
          done
          if [ -z "$LIB" ]; then
            echo "ERROR: no shader_clippy_core lib found under build/" >&2
            find build -maxdepth 4 -name 'libshader_clippy_core*' >&2 || true
            exit 1
          fi
          echo "Extracting symbols from: $LIB"
          # `nm -C --defined-only` keeps only symbols this lib defines (drops
          # external refs); `c++filt` via `-C` demangles C++ names so the
          # diff is human-readable. We sort + uniq for a stable artifact.
          nm -C --defined-only --extern-only "$LIB" \
            | awk '{print $2, $3}' \
            | sort -u \
            > build/api/api-symbols.txt
          echo "Wrote $(wc -l < build/api/api-symbols.txt) symbols."
          head -20 build/api/api-symbols.txt

          # TODO(v1.0.x): once `tools/api/v1-symbols.txt` is checked in at
          # the v1.0 tag, gate this job on:
          #   diff -u tools/api/v1-symbols.txt build/api/api-symbols.txt
          # A removed symbol (line prefixed `-` in the diff and matching a
          # `T ` / `U ` definition in the baseline) is a v2.0 break; fail
          # the job. Added symbols are fine. The gate lands as a v1.0.x
          # patch so v1.0 itself can establish the baseline cleanly.

      - name: Upload symbol list artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: api-symbols-linux
          path: build/api/api-symbols.txt
          if-no-files-found: error
          retention-days: 30

  # ── Slang bump regression (v1.0 readiness criterion #10) ───────────────
  # ADR 0018 §5 #10 — reflection-driven rules survive Slang submodule
  # bumps without source changes. We bump `cmake/SlangVersion.cmake`'s
  # `SHADER_CLIPPY_SLANG_VERSION` to the next-patch synthetic value
  # (2026.7.2), re-fetch, and run the full ctest baseline. Failure means
  # a Slang patch broke our reflection — the maintainer has overnight
  # lead time before the user-visible bump.
  #
  # Nightly + workflow_dispatch only — push/PR runs would otherwise
  # double the Slang download cost across every commit.
  slang-bump-regression:
    name: Slang bump regression (Linux, nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    # Failure here must not red-X push/PR runs. The job is informational —
    # a maintainer triages overnight and decides whether the bump can land.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Clang 18 + libc++
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5

      - name: Bump pinned Slang version
        run: |
          set -euo pipefail
          # Bump the patch component of SHADER_CLIPPY_SLANG_VERSION by 1 to
          # force a fresh download from the upstream Slang releases. We
          # capture the original value so the failure message tells the
          # maintainer exactly which transition broke.
          ORIGINAL=$(grep -oE 'SHADER_CLIPPY_SLANG_VERSION[[:space:]]+"[^"]+"' \
              cmake/SlangVersion.cmake \
              | head -n1 \
              | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Original Slang version: $ORIGINAL"
          # Synthetic next-patch — derived from the pinned value so the
          # bump tracks the source of truth.
          MAJOR=$(echo "$ORIGINAL" | cut -d. -f1)
          MINOR=$(echo "$ORIGINAL" | cut -d. -f2)
          PATCH=$(echo "$ORIGINAL" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "Synthetic next-patch:   $NEXT"
          sed -i -E \
            "s/(SHADER_CLIPPY_SLANG_VERSION[[:space:]]+\")[^\"]+(\")/\1${NEXT}\2/" \
            cmake/SlangVersion.cmake
          grep SHADER_CLIPPY_SLANG_VERSION cmake/SlangVersion.cmake

      - name: Fetch bumped Slang prebuilt
        run: bash tools/fetch-slang.sh

      - name: CMake configure
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

  # ── IHV-target snapshot (v1.0 readiness criterion #11) ─────────────────
  # ADR 0018 §5 #11 — vendor-specific (`[experimental.target = *]`) rules
  # cleanly disabled on default config. We run the corpus through the
  # CLI's JSON output once with default config and once with each of
  # `rdna4` / `blackwell` / `xe2`, then diff against snapshots checked
  # into `tests/golden/ihv-targets/`. The default snapshot must contain
  # ZERO `experimental_target()`-gated diagnostics — that's the criterion
  # enforcement. A non-empty default snapshot blocks the merge.
  ihv-target-snapshot:
    name: IHV-target snapshot (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Clang 18 + libc++
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5

      - name: Cache Slang prebuilt
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/shader-clippy/slang
          key: slang-Linux-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      - name: CMake configure
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build CLI
        run: cmake --build build --target shader-clippy

      - name: Locate shader-clippy binary
        id: locate
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/shader-clippy" \
              "./build/shader-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate shader-clippy binary" >&2
            exit 1
          fi
          echo "bin=$BIN" >> "$GITHUB_OUTPUT"
          echo "Using binary: $BIN"

      - name: Run snapshots (default + 3 IHV targets)
        env:
          BIN: ${{ steps.locate.outputs.bin }}
        run: |
          set -euo pipefail
          mkdir -p build/ihv-snapshots
          # Linter drives the corpus once per target value. Each invocation
          # writes its own JSON file; the comparison step below diffs each
          # against the checked-in baseline under tests/golden/ihv-targets/.
          # Pass --format=json explicitly so the auto-detection of
          # GITHUB_ACTIONS=true doesn't switch us to github-annotations.
          run_lint() {
            local toml="$1"
            local out="$2"
            "$BIN" lint tests/corpus/ \
              --config "$toml" \
              --format=json \
              > "$out" || true
          }

          # Default config — write an empty TOML so no [experimental] target
          # is selected.
          : > build/ihv-snapshots/default.toml
          run_lint build/ihv-snapshots/default.toml \
                   build/ihv-snapshots/default.json

          for target in rdna4 blackwell xe2; do
            # Use printf rather than a heredoc — heredoc bodies must start
            # at column 0, which the YAML parser then mistakes for a new
            # mapping key. printf keeps everything on indented lines.
            printf '[experimental]\ntarget = "%s"\n' "$target" \
              > "build/ihv-snapshots/${target}.toml"
            run_lint "build/ihv-snapshots/${target}.toml" \
                     "build/ihv-snapshots/${target}.json"
          done

      - name: Enforce default-snapshot has zero IHV-target diagnostics
        run: |
          set -euo pipefail
          # Criterion #11 of ADR 0018 §5: the default snapshot may not
          # contain any diagnostic whose code looks IHV-specific. The
          # exact set of suffixes is documented in the rule registry; we
          # match on the three published needles and also forbid the
          # `clippy::*` codes from leaking. A non-zero exit here blocks
          # the merge.
          if grep -E '"code":[[:space:]]*"[^"]*(-on-rdna4|-blackwell-|-on-xe2)"' \
                  build/ihv-snapshots/default.json; then
            echo "ERROR: default-config snapshot contains IHV-target-gated diagnostics." >&2
            echo "       This violates ADR 0018 §5 criterion #11 — vendor-specific" >&2
            echo "       rules must stay silent on default config." >&2
            exit 1
          fi
          echo "Default snapshot is IHV-target-clean."

      - name: Compare against checked-in goldens (informational)
        run: |
          set -euo pipefail
          BASELINE_DIR=tests/golden/ihv-targets
          if [ ! -d "$BASELINE_DIR" ]; then
            echo "NOTE: $BASELINE_DIR does not exist yet; emitting initial snapshots."
            echo "      Check the artifacts into the repo to gate future runs."
            exit 0
          fi
          rc=0
          for target in default rdna4 blackwell xe2; do
            if [ -f "$BASELINE_DIR/${target}.json" ]; then
              diff -u "$BASELINE_DIR/${target}.json" \
                      "build/ihv-snapshots/${target}.json" \
                || rc=1
            else
              echo "NOTE: missing baseline $BASELINE_DIR/${target}.json (emitted for first time)."
            fi
          done
          if [ $rc -ne 0 ]; then
            echo "ERROR: IHV-target snapshot drift detected." >&2
            echo "       Refresh with the uploaded artifacts after review." >&2
            exit 1
          fi

      - name: Upload IHV snapshots
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: ihv-target-snapshots
          path: build/ihv-snapshots/*.json
          if-no-files-found: error
          retention-days: 30
