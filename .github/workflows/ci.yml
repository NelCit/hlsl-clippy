# CI — build hlsl-clippy on Linux (Clang), Windows (MSVC/Ninja), macOS (Clang/Ninja)
#
# Third-party action SHAs pinned for supply-chain safety.
# Update them with: gh api /repos/<owner>/<repo>/git/ref/tags/<tag>
#
# Pinned SHAs (as of 2026-04-30, verified via GitHub API):
#   actions/checkout@v4.2.2            → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/cache@v4.2.3               → 5a3ec84eff668545956fd18022155c47e93e2684
#   seanmiddleditch/gha-setup-ninja@v5 → 96bed6edff20d1dd61ecff9b75cc519d516e6401
#   ilammy/msvc-dev-cmd@v1.13.0        → 0b201ec74fa43914dc39ae48a89fd1d8cb592756
#     (ilammy SHA is the underlying commit; the tag is annotated — GHA resolves
#      annotated tags to their commit object automatically)
#
# macOS runner: macos-14 is Apple Silicon (ARM64). Homebrew prefix is
# /opt/homebrew (Intel runners use /usr/local). Per ADR 0014 §"Sub-phase 5d",
# we ship Apple-Silicon-only on v0.5; revisit Intel coverage if user demand
# materialises.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      # ── 2. Restore build cache ─────────────────────────────────────────────
      # Key: OS + hash of CMakeLists.txt + current submodule HEADs.
      # Submodule SHAs are captured via .gitmodules HEAD pointers baked into
      # the checkout; we hash them together with CMakeLists.txt.
      #
      # TODO: cache Slang's prebuilt artifacts via sccache once vendored.
      - name: Cache build directory
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build
          key: build-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.gitmodules') }}
          restore-keys: |
            build-${{ matrix.os }}-

      # ── 3. Ninja ───────────────────────────────────────────────────────────
      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5
        # SHA verified: gh api repos/seanmiddleditch/gha-setup-ninja/git/ref/tags/v5

      # ── 4a. (Linux) Install Clang 18 + libc++ 18 from llvm.org ────────────
      - name: Install Clang 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          # Use the official LLVM installer script so we get a fresh Clang 18
          # regardless of what Ubuntu ships in its default apt mirror. The
          # `all` flag installs the full LLVM 18 component set including
          # libc++-18-dev, which we link against on Linux instead of the
          # system libstdc++ — Ubuntu 24.04's libstdc++ 13 lacks reliable
          # std::expected symbol visibility despite shipping <expected>.
          # Per ADR 0004 the floor is "Clang 18+ with libc++ 17+ OR
          # libstdc++ 13+"; we pick libc++ 18 here.
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          # Sanity-check
          clang-18 --version
          clang++-18 --version

      # ── 4b. (Windows) Activate MSVC dev environment for clang-cl ─────────
      # We use clang-cl (Clang front-end with MSVC-compatible flag syntax +
      # MSVC ABI) instead of cl.exe everywhere on Windows. clang-cl reuses
      # the MSVC installation: the linker (`link.exe`), the Windows SDK
      # headers, and the C runtime libs. We keep `msvc-dev-cmd` to wire up
      # `INCLUDE`, `LIB`, and `PATH` to the VS install; the cmake configure
      # step below sets `CC=clang-cl`, `CXX=clang-cl` to swap the compiler.
      # Win: smaller / faster binaries (Clang LTO, better dead-code elim),
      # one compiler family across all 3 platforms, better diagnostics.
      # `windows-latest` runners ship LLVM 20+ at `C:\Program Files\LLVM\bin`.
      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      # ── 4c. (macOS) Install Clang 18 from Homebrew ────────────────────────
      # macos-14 (Apple Silicon) ships Apple Clang as the default toolchain;
      # we install Homebrew's llvm@18 to keep the C++23 floor consistent
      # with the Linux runner (ADR 0004 — same compiler floor across CI
      # runners). The /opt/homebrew prefix is Apple-Silicon-only; on Intel
      # runners the path would be /usr/local/opt/llvm@18/bin (not used here).
      - name: Install Clang 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install llvm@18
          # Homebrew's llvm@18 is keg-only and ships unversioned binaries
          # (`clang`, `clang++`) — not `clang-18`/`clang++-18` like apt's
          # llvm.sh on Linux. Prepend the keg's bin/ to PATH and use the
          # unversioned names everywhere on macOS.
          echo "/opt/homebrew/opt/llvm@18/bin" >> "$GITHUB_PATH"
          /opt/homebrew/opt/llvm@18/bin/clang --version
          /opt/homebrew/opt/llvm@18/bin/clang++ --version

      # ── 4d. Slang prebuilt cache (skip the ~20-min from-source build) ────
      # `tools/fetch-slang.{sh,ps1}` populates the per-user prebuilt cache
      # at `$HOME/.cache/hlsl-clippy/slang/<version>/` (Linux/macOS) or
      # `%LOCALAPPDATA%\hlsl-clippy\slang\<version>\` (Windows). The
      # `cmake/UseSlang.cmake` resolver picks up that cache before the
      # submodule fallback path. The cache is keyed by version pin in
      # `cmake/SlangVersion.cmake`; bumping the submodule SHA also bumps
      # that file, so the next CI run downloads the matching prebuilt.
      - name: Fetch Slang prebuilt (Linux + macOS)
        if: runner.os != 'Windows'
        run: bash tools/fetch-slang.sh

      - name: Fetch Slang prebuilt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh tools/fetch-slang.ps1

      # ── 5. CMake configure ────────────────────────────────────────────────
      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-18
          CXX: clang++-18
          # Use Clang's bundled libc++ (full <expected>); avoids libstdc++ 13
          # symbol-visibility quirks on Ubuntu 24.04. Per ADR 0004's floor.
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        env:
          CC: clang-cl
          CXX: clang-cl
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        env:
          # Homebrew llvm@18 ships unversioned `clang` / `clang++` (vs apt's
          # versioned names on Linux). The PATH prepend in the install step
          # ensures the keg's binary is found ahead of Apple Clang.
          CC: clang
          CXX: clang++
          # Use Clang's bundled libc++ (matches Linux config; libc++ ships
          # the full C++23 stdlib including std::expected).
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # ── 6. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build

      # ── 7. Smoke test ─────────────────────────────────────────────────────
      # The rename agent restructures crates/cli + crates/core → cli/ + core/,
      # placing the executable at:
      #   ./build/cli/hlsl-clippy          (Linux, Ninja single-config)
      #   ./build/cli/hlsl-clippy.exe      (Windows, Ninja single-config)
      #   ./build/cli/Release/hlsl-clippy.exe  (MSVC multi-config — not used
      #                                          here because we force Ninja,
      #                                          but kept as a fallback)
      # Before the rename lands the binary sits at:
      #   ./build/hlsl-clippy   /   ./build/hlsl-clippy.exe
      # We probe all candidate paths and run whichever we find first.

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/hlsl-clippy" \
              "./build/hlsl-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate hlsl-clippy binary" >&2
            exit 1
          fi
          echo "Using binary: $BIN"
          OUTPUT=$("$BIN" --version)
          echo "Output: $OUTPUT"
          if [ "$OUTPUT" != "0.5.6" ]; then
            echo "ERROR: expected '0.5.6', got '$OUTPUT'" >&2
            exit 1
          fi
          echo "Smoke test passed."

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            ".\build\cli\hlsl-clippy.exe",
            ".\build\cli\Release\hlsl-clippy.exe",
            ".\build\hlsl-clippy.exe"
          )
          $bin = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) {
              $bin = $c
              break
            }
          }
          if (-not $bin) {
            Write-Error "ERROR: could not locate hlsl-clippy binary"
            exit 1
          }
          Write-Host "Using binary: $bin"
          $output = & $bin --version
          Write-Host "Output: $output"
          if ($output -ne "0.5.6") {
            Write-Error "ERROR: expected '0.5.6', got '$output'"
            exit 1
          }
          Write-Host "Smoke test passed."

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/hlsl-clippy" \
              "./build/hlsl-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate hlsl-clippy binary" >&2
            exit 1
          fi
          echo "Using binary: $BIN"
          OUTPUT=$("$BIN" --version)
          echo "Output: $OUTPUT"
          if [ "$OUTPUT" != "0.5.6" ]; then
            echo "ERROR: expected '0.5.6', got '$OUTPUT'" >&2
            exit 1
          fi
          echo "Smoke test passed."
