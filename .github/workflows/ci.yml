# CI — build hlsl-clippy on Linux (Clang), Windows (MSVC/Ninja), macOS (Clang/Ninja)
#
# Third-party action SHAs pinned for supply-chain safety.
# Update them with: gh api /repos/<owner>/<repo>/git/ref/tags/<tag>
#
# Pinned SHAs (as of 2026-04-30, verified via GitHub API):
#   actions/checkout@v4.2.2            → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/cache@v4.2.3               → 5a3ec84eff668545956fd18022155c47e93e2684
#   seanmiddleditch/gha-setup-ninja@v5 → 96bed6edff20d1dd61ecff9b75cc519d516e6401
#   ilammy/msvc-dev-cmd@v1.13.0        → 0b201ec74fa43914dc39ae48a89fd1d8cb592756
#     (ilammy SHA is the underlying commit; the tag is annotated — GHA resolves
#      annotated tags to their commit object automatically)
#
# macOS runner: macos-14 is Apple Silicon (ARM64). Homebrew prefix is
# /opt/homebrew (Intel runners use /usr/local). Per ADR 0014 §"Sub-phase 5d",
# we ship Apple-Silicon-only on v0.5; revisit Intel coverage if user demand
# materialises.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      # ── 2. Restore build cache ─────────────────────────────────────────────
      # Key: OS + hash of CMakeLists.txt + current submodule HEADs.
      # Submodule SHAs are captured via .gitmodules HEAD pointers baked into
      # the checkout; we hash them together with CMakeLists.txt.
      #
      # TODO: cache Slang's prebuilt artifacts via sccache once vendored.
      - name: Cache build directory
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: build
          key: build-${{ matrix.os }}-${{ hashFiles('CMakeLists.txt', '**/CMakeLists.txt', '.gitmodules', 'cmake/SlangVersion.cmake') }}
          restore-keys: |
            build-${{ matrix.os }}-

      # ── 3. Ninja ───────────────────────────────────────────────────────────
      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5
        # SHA verified: gh api repos/seanmiddleditch/gha-setup-ninja/git/ref/tags/v5

      # ── 4a. (Linux) Install Clang 18 + libc++ 18 from llvm.org ────────────
      - name: Install Clang 18 (Linux)
        if: runner.os == 'Linux'
        run: |
          # Use the official LLVM installer script so we get a fresh Clang 18
          # regardless of what Ubuntu ships in its default apt mirror. The
          # `all` flag installs the full LLVM 18 component set including
          # libc++-18-dev, which we link against on Linux instead of the
          # system libstdc++ — Ubuntu 24.04's libstdc++ 13 lacks reliable
          # std::expected symbol visibility despite shipping <expected>.
          # Per ADR 0004 the floor is "Clang 18+ with libc++ 17+ OR
          # libstdc++ 13+"; we pick libc++ 18 here.
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          # Sanity-check
          clang-18 --version
          clang++-18 --version

      # ── 4b. (Windows) Activate MSVC dev environment for clang-cl ─────────
      # We use clang-cl (Clang front-end with MSVC-compatible flag syntax +
      # MSVC ABI) instead of cl.exe everywhere on Windows. clang-cl reuses
      # the MSVC installation: the linker (`link.exe`), the Windows SDK
      # headers, and the C runtime libs. We keep `msvc-dev-cmd` to wire up
      # `INCLUDE`, `LIB`, and `PATH` to the VS install; the cmake configure
      # step below sets `CC=clang-cl`, `CXX=clang-cl` to swap the compiler.
      # Win: smaller / faster binaries (Clang LTO, better dead-code elim),
      # one compiler family across all 3 platforms, better diagnostics.
      # `windows-latest` runners ship LLVM 20+ at `C:\Program Files\LLVM\bin`.
      - name: Set up MSVC dev environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      # ── 4c. (macOS) Install Clang 18 from Homebrew ────────────────────────
      # macos-14 (Apple Silicon) ships Apple Clang as the default toolchain;
      # we install Homebrew's llvm@18 to keep the C++23 floor consistent
      # with the Linux runner (ADR 0004 — same compiler floor across CI
      # runners). The /opt/homebrew prefix is Apple-Silicon-only; on Intel
      # runners the path would be /usr/local/opt/llvm@18/bin (not used here).
      - name: Install Clang 18 (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          brew install llvm@18
          # Homebrew's llvm@18 is keg-only and ships unversioned binaries
          # (`clang`, `clang++`) — not `clang-18`/`clang++-18` like apt's
          # llvm.sh on Linux. Prepend the keg's bin/ to PATH and use the
          # unversioned names everywhere on macOS.
          echo "/opt/homebrew/opt/llvm@18/bin" >> "$GITHUB_PATH"
          /opt/homebrew/opt/llvm@18/bin/clang --version
          /opt/homebrew/opt/llvm@18/bin/clang++ --version

      # ── 4d. Slang prebuilt cache ─────────────────────────────────────────
      # Two-tier caching:
      #   (i)  actions/cache keyed on cmake/SlangVersion.cmake — per-version
      #        cache of the extracted Slang prebuilt directory. Cache hit
      #        means tools/fetch-slang.* short-circuits on the idempotency
      #        check (existing `include/` dir) and skips the ~50-100 MB
      #        download. Saves ~30-60s per leg.
      #   (ii) tools/fetch-slang.* downloads the upstream tarball if the
      #        cache directory is empty. Idempotent.
      - name: Cache Slang prebuilt (Linux + macOS)
        if: runner.os != 'Windows'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/hlsl-clippy/slang
          key: slang-${{ runner.os }}-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Cache Slang prebuilt (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ env.LOCALAPPDATA }}\hlsl-clippy\slang
          key: slang-${{ runner.os }}-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt (Linux + macOS)
        if: runner.os != 'Windows'
        run: bash tools/fetch-slang.sh

      - name: Fetch Slang prebuilt (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh tools/fetch-slang.ps1

      # ── 5. CMake configure ────────────────────────────────────────────────
      - name: CMake configure (Linux)
        if: runner.os == 'Linux'
        env:
          CC: clang-18
          CXX: clang++-18
          # Use Clang's bundled libc++ (full <expected>); avoids libstdc++ 13
          # symbol-visibility quirks on Ubuntu 24.04. Per ADR 0004's floor.
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake configure (Windows)
        if: runner.os == 'Windows'
        env:
          CC: clang-cl
          CXX: clang-cl
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake configure (macOS)
        if: runner.os == 'macOS'
        env:
          # Homebrew llvm@18 ships unversioned `clang` / `clang++` (vs apt's
          # versioned names on Linux). The PATH prepend in the install step
          # ensures the keg's binary is found ahead of Apple Clang.
          CC: clang
          CXX: clang++
          # Use Clang's bundled libc++ (matches Linux config; libc++ ships
          # the full C++23 stdlib including std::expected).
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      # ── 6. Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build

      # ── 7. Smoke test ─────────────────────────────────────────────────────
      # The rename agent restructures crates/cli + crates/core → cli/ + core/,
      # placing the executable at:
      #   ./build/cli/hlsl-clippy          (Linux, Ninja single-config)
      #   ./build/cli/hlsl-clippy.exe      (Windows, Ninja single-config)
      #   ./build/cli/Release/hlsl-clippy.exe  (MSVC multi-config — not used
      #                                          here because we force Ninja,
      #                                          but kept as a fallback)
      # Before the rename lands the binary sits at:
      #   ./build/hlsl-clippy   /   ./build/hlsl-clippy.exe
      # We probe all candidate paths and run whichever we find first.

      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/hlsl-clippy" \
              "./build/hlsl-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate hlsl-clippy binary" >&2
            exit 1
          fi
          echo "Using binary: $BIN"
          OUTPUT=$("$BIN" --version)
          echo "Output: $OUTPUT"
          if [ "$OUTPUT" != "0.5.6" ]; then
            echo "ERROR: expected '0.5.6', got '$OUTPUT'" >&2
            exit 1
          fi
          echo "Smoke test passed."

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            ".\build\cli\hlsl-clippy.exe",
            ".\build\cli\Release\hlsl-clippy.exe",
            ".\build\hlsl-clippy.exe"
          )
          $bin = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) {
              $bin = $c
              break
            }
          }
          if (-not $bin) {
            Write-Error "ERROR: could not locate hlsl-clippy binary"
            exit 1
          }
          Write-Host "Using binary: $bin"
          $output = & $bin --version
          Write-Host "Output: $output"
          if ($output -ne "0.5.6") {
            Write-Error "ERROR: expected '0.5.6', got '$output'"
            exit 1
          }
          Write-Host "Smoke test passed."

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          BIN=""
          for candidate in \
              "./build/cli/hlsl-clippy" \
              "./build/hlsl-clippy"; do
            if [ -x "$candidate" ]; then
              BIN="$candidate"
              break
            fi
          done
          if [ -z "$BIN" ]; then
            echo "ERROR: could not locate hlsl-clippy binary" >&2
            exit 1
          fi
          echo "Using binary: $BIN"
          OUTPUT=$("$BIN" --version)
          echo "Output: $OUTPUT"
          if [ "$OUTPUT" != "0.5.6" ]; then
            echo "ERROR: expected '0.5.6', got '$OUTPUT'" >&2
            exit 1
          fi
          echo "Smoke test passed."

  # ── Coverage (Linux Clang + llvm-cov + Codecov) ────────────────────────
  # ADR 0005 §"Coverage gate" promised this; CLAUDE.md status block calls
  # for 60% baseline rising to 80% by Phase 4. We instrument core/ only —
  # CLI / LSP get exercised end-to-end by the test corpus but the bar we
  # care about is rule-engine line coverage. Codecov uploads run on push
  # to main and PRs from forks; the action handles tokenless OIDC for
  # public repos.
  #
  # Why this is its own job and not folded into the Linux build leg:
  #   * the coverage build needs different compile flags
  #     (`-fprofile-instr-generate -fcoverage-mapping`) and a different
  #     CMAKE_BUILD_TYPE; mixing them with the Release build would defeat
  #     the build-cache key that the Linux leg shares with release.yml.
  #   * we want the coverage job to fail loudly without taking down the
  #     other CI legs.
  coverage:
    name: Coverage (Linux Clang + llvm-cov)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Install Clang 18 + llvm-cov
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev cmake ninja-build
          # llvm-profdata-18 / llvm-cov-18 ship with the `all` apt component.
          llvm-cov-18 --version
          llvm-profdata-18 --version

      - name: Cache Slang prebuilt
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/hlsl-clippy/slang
          key: slang-Linux-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      - name: CMake configure (instrumented Debug)
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: "-stdlib=libc++ -fprofile-instr-generate -fcoverage-mapping -O0 -g"
          LDFLAGS: "-stdlib=libc++ -fprofile-instr-generate"
        run: |
          cmake -B build-cov -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DHLSL_CLIPPY_USE_PCH=OFF \
            -DHLSL_CLIPPY_USE_LTO=OFF

      - name: Build core + tests
        run: cmake --build build-cov --target hlsl_clippy_unit_tests

      - name: Run tests with profile output
        env:
          # Each test invocation writes to the templated path; %m expands
          # to a unique per-process suffix so parallel ctest workers do not
          # clobber each other.
          LLVM_PROFILE_FILE: "${{ github.workspace }}/build-cov/profraw/cov-%p-%m.profraw"
        run: |
          set -euo pipefail
          mkdir -p build-cov/profraw
          # `~[golden]` excludes the 4 known-flaky golden-snapshot tests
          # (per tests/KNOWN_FAILURES.md). They occasionally
          # STATUS_STACK_BUFFER_OVERRUN on Windows + occasionally trip
          # CRLF/LF mismatches — neither is meaningful for coverage.
          ./build-cov/tests/hlsl_clippy_unit_tests "~[golden]"

      - name: Merge profile data
        run: |
          set -euo pipefail
          llvm-profdata-18 merge -sparse build-cov/profraw/*.profraw \
            -o build-cov/coverage.profdata

      - name: Generate lcov report (core/ only)
        run: |
          set -euo pipefail
          # `-instr-profile` consumes the merged profdata; the binary is
          # the unit-test exe (which links hlsl_clippy_core statically).
          # `--ignore-filename-regex` drops vendored / test code so the
          # percentage reflects rule-engine coverage.
          llvm-cov-18 export \
            -format=lcov \
            -instr-profile=build-cov/coverage.profdata \
            -ignore-filename-regex='(external|tests|build|/usr/)' \
            ./build-cov/tests/hlsl_clippy_unit_tests \
            > build-cov/coverage.lcov
          # Quick console summary so the failure mode in PR review is
          # legible without downloading the lcov.
          llvm-cov-18 report \
            -instr-profile=build-cov/coverage.profdata \
            -ignore-filename-regex='(external|tests|build|/usr/)' \
            ./build-cov/tests/hlsl_clippy_unit_tests \
            | tail -20

      - name: Upload to Codecov
        uses: codecov/codecov-action@0565863a31f2c772f9f0395002a31e3f06189574 # v5.4.0
        with:
          files: build-cov/coverage.lcov
          # No token needed for public repos using tokenless OIDC; the
          # action falls back gracefully if Codecov isn't configured for
          # the repo (PR comment + status check just don't post).
          fail_ci_if_error: false
