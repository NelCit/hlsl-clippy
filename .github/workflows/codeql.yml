# CodeQL — security + quality scanning for the C++ core/cli/lsp surface
# and the TypeScript vscode-extension surface.
#
# The previous codeql.yml was a 1-line stub deleted in commit 41c3076 ("No
# event triggers defined in `on`"). This workflow re-introduces real scanning
# per the v0.6 hardening backlog from the 2026-05-01 CI/CD + security audits.
#
# Build matrix: cpp uses GitHub's autobuild, which invokes `cmake -B build
# && cmake --build build` against the same toolchain that `ci.yml` uses.
# Slang prebuilt fetch happens before configure so autobuild doesn't sit
# through 20 minutes of from-source Slang compile.
#
# Third-party action SHAs pinned for supply-chain safety (per ADR 0005):
#   actions/checkout@v4.2.2                → 11bd71901bbe5b1630ceea73d27597364c9af683
#   github/codeql-action/init@v3.35.3      → 0daab03d71ff584ef619d027a3fd9146679c5d84
#   github/codeql-action/autobuild@v3.35.3 → 0daab03d71ff584ef619d027a3fd9146679c5d84
#   github/codeql-action/analyze@v3.35.3   → 0daab03d71ff584ef619d027a3fd9146679c5d84

name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly Tuesday 06:00 UTC re-scan to catch new advisories that affect
    # already-merged code (CodeQL queries get updated on a roughly weekly
    # cadence).
    - cron: "0 6 * * 2"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: cpp
          - language: javascript-typescript

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      # ── C++-only: install toolchain + Slang prebuilt before autobuild ────
      - name: Install Clang 18 (C++ only)
        if: matrix.language == 'cpp'
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev cmake ninja-build

      - name: Fetch Slang prebuilt (C++ only)
        if: matrix.language == 'cpp'
        run: bash tools/fetch-slang.sh

      # ── Initialize CodeQL ────────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          languages: ${{ matrix.language }}
          # `security-and-quality` is the broader query pack (security
          # findings + maintainability + reliability). Worth the extra
          # noise on a security-adjacent linter.
          queries: security-and-quality

      # ── Build (C++ only — JS/TS analysis doesn't need a build step) ─────
      # We don't use codeql/autobuild because for our project shape it stops
      # at `cmake configure`, leaving CodeQL with zero compilation events to
      # trace and `database finalize` failing on a missing trap dir
      # (`cp: cannot stat '...cpp/trap/cpp/tarballs'`). Explicit cmake build
      # runs the compiler under CodeQL's auto-injected tracer (LD_PRELOAD on
      # Linux) so the cpp database actually gets populated. Toolchain config
      # mirrors ci.yml + release.yml.
      - name: Build (C++ only)
        if: matrix.language == 'cpp'
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: |
          set -euo pipefail
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DHLSL_CLIPPY_USE_PCH=OFF
          cmake --build build --target hlsl_clippy_core
          cmake --build build --target hlsl-clippy
          cmake --build build --target hlsl_clippy_lsp

      # ── Analyze + upload to the Security tab ────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3.35.3
        with:
          category: "/language:${{ matrix.language }}"
