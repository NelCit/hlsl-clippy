# Lint — clang-format + clang-tidy gates (Linux only)
#
# Third-party action SHAs pinned for supply-chain safety.
#
# Pinned SHAs (as of 2026-04-30):
#   actions/checkout@v4.2.2  → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/cache@v4.2.3     → 5a3ec84eff668545956fd18022155c47e93e2684

name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── VS Code extension TypeScript guard ────────────────────────────────
  # Catches strict-mode TS errors (noUnusedParameters, noUnusedLocals,
  # noImplicitAny, etc.) BEFORE the release-vscode.yml workflow tries
  # to package the .vsix on a tag push -- the v0.6.4 tag shipped with a
  # broken .vsix because a `noUnusedParameters` violation only surfaced
  # at release time when Marketplace publishing was already in flight.
  # Cheap (~30s); runs on every push + PR alongside the C++ lint.
  vscode-extension-tsc:
    name: vscode-extension TypeScript compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 20
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "20"

      - name: Install npm dependencies
        working-directory: vscode-extension
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

      - name: Compile TypeScript (tsc -p)
        working-directory: vscode-extension
        run: npx tsc -p .

      # Package the .vsix locally + verify every prod transitive
      # dependency from `npm list --production --all` is present in
      # the bundled node_modules tree. Catches the
      # "Cannot find module 'minimatch'" failure mode -- a transitive
      # of vscode-languageclient that the `.vscodeignore` allow-list
      # missed. Pre-v0.6.7 this only surfaced at extension activation
      # in real VS Code; now it's caught at PR time.
      - name: Package + bundled-deps smoke
        working-directory: vscode-extension
        shell: bash
        run: |
          set -euo pipefail
          # Dummy LSP binary so vsce package has something to ship.
          mkdir -p server/linux-x86_64
          touch server/linux-x86_64/shader-clippy-lsp
          chmod +x server/linux-x86_64/shader-clippy-lsp
          npx --yes @vscode/vsce package --target linux-x64 --out smoke.vsix
          rm -rf /tmp/vsix-unpack
          mkdir -p /tmp/vsix-unpack
          unzip -q -o smoke.vsix -d /tmp/vsix-unpack
          # Build the expected set from npm's prod-dep tree, the actual
          # set from what the .vsix contains, and diff them. The diff
          # surfaces both missing prod deps (BAD) and bundled non-prod
          # deps (worth investigating but not fatal).
          expected=$(npm list --production --all --parseable 2>/dev/null \
            | sed 's|.*/node_modules/||' \
            | grep -v '^/' \
            | grep -v '^[A-Z]' | grep -v '^$' \
            | grep -v "^$(node -p "require('./package.json').name")$" \
            | sort -u)
          actual=$(find /tmp/vsix-unpack/extension/node_modules \
            -mindepth 1 -maxdepth 2 -name package.json \
            -exec node -p "require('{}').name" \; 2>/dev/null \
            | sort -u || true)
          echo "==> Expected prod deps:"
          echo "$expected" | sed 's/^/    /'
          echo "==> Actually bundled:"
          echo "$actual" | sed 's/^/    /'
          missing=$(comm -23 <(echo "$expected") <(echo "$actual"))
          if [ -n "$missing" ]; then
            echo
            echo "::error::missing production dependencies in bundled .vsix:"
            echo "$missing" | sed 's/^/  - /'
            echo
            echo "Add the corresponding '!node_modules/<pkg>/**' lines to vscode-extension/.vscodeignore."
            exit 1
          fi
          echo
          echo "All prod deps bundled."

  # ── LSP smoke test ───────────────────────────────────────────────────
  # Spawns shader-clippy-lsp.exe and drives a real JSON-RPC handshake +
  # didOpen on a known-firing fixture. Catches:
  #   * Missing Slang shared libs (exe load failure).
  #   * Text-mode CRLF mangling (parser hangs forever) -- the v0.5.0
  #     -> 0.6.6 root cause for VS Code reporting an empty Problems
  #     panel on Windows.
  # Linux-only; the same `_setmode` Windows fix is exercised in
  # release-vscode.yml's matrix at tag time.
  lsp-smoke:
    name: shader-clippy-lsp JSON-RPC smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@96bed6edff20d1dd61ecff9b75cc519d516e6401 # v5

      - name: Install Clang 18
        run: |
          set -euo pipefail
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Cache Slang prebuilt
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/shader-clippy/slang
          key: slang-Linux-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      - name: Set up Node 20
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "20"

      - name: Build shader_clippy_lsp
        env:
          CC: clang-18
          CXX: clang++-18
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target shader_clippy_lsp

      - name: Run LSP smoke test
        run: |
          # tools/smoke-lsp.js targets build/lsp/shader-clippy-lsp.exe by
          # name; on Linux the binary is just shader-clippy-lsp. Symlink
          # so the same script works.
          ln -sf shader-clippy-lsp build/lsp/shader-clippy-lsp.exe
          node tools/smoke-lsp.js

  lint:
    name: clang-format + clang-tidy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (with submodules — clang-tidy needs vendored headers) ─
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true
        # Submodules ARE needed post-ADR 0012/0014: cmake configure now
        # unconditionally includes UseSlang.cmake + UseNlohmannJson.cmake at
        # top level (so `core` always sees `slang::slang`), and clang-tidy
        # follows the compile_commands.json -I flags into vendored
        # Slang / tree-sitter / nlohmann-json headers when tidying
        # core/src/reflection/slang_bridge.cpp et al. Pre-3a the lint job
        # could skip submodules — that fast-path no longer applies.
        # Future optimisation: download prebuilt Slang via
        # tools/fetch-slang.sh into $HOME/.cache/shader-clippy/slang/<version>/
        # so UseSlang.cmake hits the cache tier instead of the submodule
        # build fallback (per ADR 0012 Slang-cache resolution order).

      # ── 2. Install clang-format-18 and clang-tidy-18 ──────────────────────
      - name: Install clang-format-18 and clang-tidy-18
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          # libc++-18 needed because the cmake configure step below uses
          # `-stdlib=libc++` (matching ci.yml + release.yml).
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          clang-format-18 --version
          clang-tidy-18 --version

      # ── 2.6 Slang prebuilt cache ──────────────────────────────────────────
      # `cmake/UseSlang.cmake` FATAL_ERRORs if neither `Slang_ROOT` nor the
      # per-user prebuilt cache is populated. Cache the cache dir across
      # runs (keyed on cmake/SlangVersion.cmake) and let fetch-slang.sh
      # short-circuit on the idempotency check.
      - name: Cache Slang prebuilt
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/shader-clippy/slang
          key: slang-Linux-${{ hashFiles('cmake/SlangVersion.cmake') }}

      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      # ── 2.5 Forbid <slang.h> in public headers + rule TUs ─────────────────
      # ADR 0001 / ADR 0012: <slang.h> may only appear inside
      # core/src/reflection/. Public headers (core/include/shader_clippy/) and
      # rule TUs (core/src/rules/) must go through the opaque reflection.hpp
      # types instead.
      - name: Forbid <slang.h> in public headers and rule TUs
        run: |
          set -e
          if grep -RE '#\s*include\s*<slang\.h>' core/include/shader_clippy/ core/src/rules/ lsp/src/; then
            echo "ERROR: <slang.h> must not appear in core/include/shader_clippy/, core/src/rules/, or lsp/src/"
            exit 1
          fi
          echo "Slang header confinement check passed."

      # ── 3. clang-format dry-run ────────────────────────────────────────────
      # Scope: cli/, core/, tools/ — tracked .cpp/.hpp/.h files only.
      # Uses `git ls-files` so untracked or generated files are never checked.
      # EXCLUDES external/ (third-party code we do not own).
      - name: clang-format check
        run: |
          set -euo pipefail
          FILES=$(git ls-files -- \
              'cli/*.cpp' 'cli/*.hpp' 'cli/*.h' \
              'core/*.cpp' 'core/*.hpp' 'core/*.h' \
              'lsp/*.cpp' 'lsp/*.hpp' 'lsp/*.h' \
              'tools/*.cpp' 'tools/*.hpp' 'tools/*.h' \
              'cli/**/*.cpp' 'cli/**/*.hpp' 'cli/**/*.h' \
              'core/**/*.cpp' 'core/**/*.hpp' 'core/**/*.h' \
              'lsp/**/*.cpp' 'lsp/**/*.hpp' 'lsp/**/*.h' \
              'tools/**/*.cpp' 'tools/**/*.hpp' 'tools/**/*.h' \
              ':(exclude)external/' \
          )
          if [ -z "$FILES" ]; then
            # Fallback: current layout uses src/ before rename lands
            FILES=$(git ls-files -- \
                'src/*.cpp' 'src/*.hpp' 'src/*.h' \
                ':(exclude)external/' \
            )
          fi
          if [ -z "$FILES" ]; then
            echo "No C++ source files found to format-check."
            exit 0
          fi
          echo "Files to check:"
          echo "$FILES"
          # --dry-run: don't modify files; --Werror: fail on any difference.
          echo "$FILES" | xargs clang-format-18 --dry-run --Werror
          echo "clang-format check passed."

      # ── 4. CMake configure with compile_commands.json ─────────────────────
      - name: CMake configure (generate compile_commands.json)
        env:
          CC: clang-18
          CXX: clang++-18
          # Match ci.yml + release.yml: link libc++ instead of libstdc++ 13
          # to dodge Ubuntu 24.04's <expected> symbol-visibility quirks.
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DSHADER_CLIPPY_USE_PCH=OFF
        # PCH off: clang-tidy walks compile_commands.json and tries to
        # follow the `-include cmake_pch.hxx` flag, then errors with
        # "PCH file not found" because we don't actually `cmake --build`
        # in the lint job. PCH wins on the warm build path; lint doesn't
        # benefit from it.

      # ── 5. clang-tidy ─────────────────────────────────────────────────────
      # Drives `run-clang-tidy-18` (parallel wrapper that ships with the
      # apt llvm package) instead of a single serial `xargs clang-tidy`
      # call. With ~160 first-party TUs the serial pass took ~30 minutes
      # on `ubuntu-latest`; `run-clang-tidy -j$(nproc)` brings that under
      # 10 minutes on the same runner.
      #
      # Source-file filter is a regex matched against the absolute path
      # of every entry in `compile_commands.json`. We keep it permissive
      # but anchored so externals (vendored Slang / tree-sitter / etc.)
      # do not get tidied. `HeaderFilterRegex` in `.clang-tidy` still
      # applies to `#include`d headers transitively.
      - name: clang-tidy check
        run: |
          set -euo pipefail
          if ! command -v run-clang-tidy-18 >/dev/null; then
            echo "ERROR: run-clang-tidy-18 not on PATH (apt llvm install incomplete?)"
            exit 1
          fi
          PATTERN='/(cli|core|lsp|tools)/.*\.(cpp|cc|cxx)$'
          # `-quiet` suppresses the per-file "n warnings generated" line
          # noise; failing diagnostics still surface (and `set -e` halts
          # on non-zero exit). `-warnings-as-errors='*'` mirrors the
          # serial-pass behaviour the project shipped with.
          run-clang-tidy-18 \
            -p build \
            -j "$(nproc)" \
            -quiet \
            -warnings-as-errors='*' \
            "$PATTERN"
          echo "clang-tidy check passed."
