# Lint — clang-format + clang-tidy gates (Linux only)
#
# Third-party action SHAs pinned for supply-chain safety.
#
# Pinned SHAs (as of 2026-04-30):
#   actions/checkout@v4.2.2  → 11bd71901bbe5b1630ceea73d27597364c9af683

name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

# Cancel superseded runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: clang-format + clang-tidy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (with submodules — clang-tidy needs vendored headers) ─
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true
        # Submodules ARE needed post-ADR 0012/0014: cmake configure now
        # unconditionally includes UseSlang.cmake + UseNlohmannJson.cmake at
        # top level (so `core` always sees `slang::slang`), and clang-tidy
        # follows the compile_commands.json -I flags into vendored
        # Slang / tree-sitter / nlohmann-json headers when tidying
        # core/src/reflection/slang_bridge.cpp et al. Pre-3a the lint job
        # could skip submodules — that fast-path no longer applies.
        # Future optimisation: download prebuilt Slang via
        # tools/fetch-slang.sh into $HOME/.cache/hlsl-clippy/slang/<version>/
        # so UseSlang.cmake hits the cache tier instead of the submodule
        # build fallback (per ADR 0012 Slang-cache resolution order).

      # ── 2. Install clang-format-18 and clang-tidy-18 ──────────────────────
      - name: Install clang-format-18 and clang-tidy-18
        run: |
          wget -qO- https://apt.llvm.org/llvm.sh | sudo bash -s -- 18 all
          # libc++-18 needed because the cmake configure step below uses
          # `-stdlib=libc++` (matching ci.yml + release.yml).
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          clang-format-18 --version
          clang-tidy-18 --version

      # ── 2.6 Slang prebuilt cache ──────────────────────────────────────────
      # `cmake/UseSlang.cmake` FATAL_ERRORs if neither `Slang_ROOT` nor the
      # per-user prebuilt cache is populated (commit 73c0322 retired the
      # from-source submodule fallback). Mirror what ci.yml and release.yml
      # do: invoke `tools/fetch-slang.sh` before `cmake configure`.
      - name: Fetch Slang prebuilt
        run: bash tools/fetch-slang.sh

      # ── 2.5 Forbid <slang.h> in public headers + rule TUs ─────────────────
      # ADR 0001 / ADR 0012: <slang.h> may only appear inside
      # core/src/reflection/. Public headers (core/include/hlsl_clippy/) and
      # rule TUs (core/src/rules/) must go through the opaque reflection.hpp
      # types instead.
      - name: Forbid <slang.h> in public headers and rule TUs
        run: |
          set -e
          if grep -RE '#\s*include\s*<slang\.h>' core/include/hlsl_clippy/ core/src/rules/ lsp/src/; then
            echo "ERROR: <slang.h> must not appear in core/include/hlsl_clippy/, core/src/rules/, or lsp/src/"
            exit 1
          fi
          echo "Slang header confinement check passed."

      # ── 3. clang-format dry-run ────────────────────────────────────────────
      # Scope: cli/, core/, tools/ — tracked .cpp/.hpp/.h files only.
      # Uses `git ls-files` so untracked or generated files are never checked.
      # EXCLUDES external/ (third-party code we do not own).
      - name: clang-format check
        run: |
          set -euo pipefail
          FILES=$(git ls-files -- \
              'cli/*.cpp' 'cli/*.hpp' 'cli/*.h' \
              'core/*.cpp' 'core/*.hpp' 'core/*.h' \
              'lsp/*.cpp' 'lsp/*.hpp' 'lsp/*.h' \
              'tools/*.cpp' 'tools/*.hpp' 'tools/*.h' \
              'cli/**/*.cpp' 'cli/**/*.hpp' 'cli/**/*.h' \
              'core/**/*.cpp' 'core/**/*.hpp' 'core/**/*.h' \
              'lsp/**/*.cpp' 'lsp/**/*.hpp' 'lsp/**/*.h' \
              'tools/**/*.cpp' 'tools/**/*.hpp' 'tools/**/*.h' \
              ':(exclude)external/' \
          )
          if [ -z "$FILES" ]; then
            # Fallback: current layout uses src/ before rename lands
            FILES=$(git ls-files -- \
                'src/*.cpp' 'src/*.hpp' 'src/*.h' \
                ':(exclude)external/' \
            )
          fi
          if [ -z "$FILES" ]; then
            echo "No C++ source files found to format-check."
            exit 0
          fi
          echo "Files to check:"
          echo "$FILES"
          # --dry-run: don't modify files; --Werror: fail on any difference.
          echo "$FILES" | xargs clang-format-18 --dry-run --Werror
          echo "clang-format check passed."

      # ── 4. CMake configure with compile_commands.json ─────────────────────
      - name: CMake configure (generate compile_commands.json)
        env:
          CC: clang-18
          CXX: clang++-18
          # Match ci.yml + release.yml: link libc++ instead of libstdc++ 13
          # to dodge Ubuntu 24.04's <expected> symbol-visibility quirks.
          CXXFLAGS: "-stdlib=libc++"
          LDFLAGS: "-stdlib=libc++"
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # ── 5. clang-tidy ─────────────────────────────────────────────────────
      # Same file set as clang-format; warnings promoted to errors.
      - name: clang-tidy check
        run: |
          set -euo pipefail
          FILES=$(git ls-files -- \
              'cli/*.cpp' 'cli/*.hpp' 'cli/*.h' \
              'core/*.cpp' 'core/*.hpp' 'core/*.h' \
              'lsp/*.cpp' 'lsp/*.hpp' 'lsp/*.h' \
              'tools/*.cpp' 'tools/*.hpp' 'tools/*.h' \
              'cli/**/*.cpp' 'cli/**/*.hpp' 'cli/**/*.h' \
              'core/**/*.cpp' 'core/**/*.hpp' 'core/**/*.h' \
              'lsp/**/*.cpp' 'lsp/**/*.hpp' 'lsp/**/*.h' \
              'tools/**/*.cpp' 'tools/**/*.hpp' 'tools/**/*.h' \
              ':(exclude)external/' \
          )
          if [ -z "$FILES" ]; then
            FILES=$(git ls-files -- \
                'src/*.cpp' 'src/*.hpp' 'src/*.h' \
                ':(exclude)external/' \
            )
          fi
          if [ -z "$FILES" ]; then
            echo "No C++ source files found to tidy-check."
            exit 0
          fi
          echo "Files to check:"
          echo "$FILES"
          # -p build      — point at the compile_commands.json directory
          # -warnings-as-errors='*'  — any diagnostic is a hard failure
          echo "$FILES" | xargs clang-tidy-18 \
            -p build \
            -warnings-as-errors='*'
          echo "clang-tidy check passed."
